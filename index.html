<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<title>Live Bee Signal</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
}

canvas {
    background: #111;
    margin: 10px;
}
</style>
</head>

<body>

<h2>Live semnal + FFT (ZOOM)</h2>

<canvas id="timeChart"></canvas>
<canvas id="fftChart"></canvas>

<script>
// ---------------- FIREBASE ----------------
firebase.initializeApp({
    databaseURL: "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();

// ---------------- CHART: TIME ----------------
const timeChart = new Chart(document.getElementById("timeChart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Semnal (zoom)",
            data: [],
            borderColor: "lime",
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        responsive: true
    }
});

// ---------------- CHART: FFT ----------------
const fftChart = new Chart(document.getElementById("fftChart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "FFT",
            data: [],
            borderColor: "red",
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        responsive: true
    }
});

// ---------------- FFT ----------------
function fft(signal) {
    const N = signal.length;
    let re = new Array(N).fill(0);
    let im = new Array(N).fill(0);

    for (let k = 0; k < N; k++) {
        for (let t = 0; t < N; t++) {
            const angle = 2 * Math.PI * k * t / N;
            re[k] += signal[t] * Math.cos(angle);
            im[k] -= signal[t] * Math.sin(angle);
        }
    }

    return re.map((r, i) => Math.sqrt(r*r + im[i]*im[i]) / N);
}

// ---------------- CONFIG ----------------
const MAX_POINTS = 80; // 🔥 ZOOM (mai mic = mai zoom)

// ---------------- UPDATE ----------------
db.ref("stup_01/latest_data").on("value", snap => {

    const data = snap.val();
    if (!data || !Array.isArray(data.buffer)) return;

    let y = data.buffer;

    // =========================
    // ZOOM PE SEMNAL
    // =========================
    if (y.length > MAX_POINTS) {
        y = y.slice(y.length - MAX_POINTS);
    }

    timeChart.data.labels = y.map((_, i) => i);
    timeChart.data.datasets[0].data = y;
    timeChart.update('none');

    // =========================
    // FFT STABIL
    // =========================
    const spectrum = fft(y);
    const half = spectrum.slice(0, Math.floor(spectrum.length / 2));

    fftChart.data.labels = half.map((_, i) => i);
    fftChart.data.datasets[0].data = half;
    fftChart.update('none');
});
</script>

</body>
</html>
