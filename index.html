<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bee Monitor Live</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        background: black;
        color: lime;
        font-family: monospace;
        text-align: center;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
    }

    canvas {
        background: #111;
        border: 1px solid #333;
    }
</style>
</head>

<body>

<h2>LIVE Bee Signal Analyzer</h2>
<div id="status">waiting for data...</div>

<div class="container">

    <div>
        <h3>Time Domain</h3>
        <canvas id="timeChart" width="700" height="250"></canvas>
    </div>

    <div>
        <h3>Frequency Domain</h3>
        <canvas id="freqChart" width="700" height="250"></canvas>
    </div>

</div>

<script>
const url = "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/stup_01/latest_data.json";

// ---------------- TIME CHART ----------------
const timeCtx = document.getElementById("timeChart").getContext("2d");

const timeChart = new Chart(timeCtx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Signal",
            data: [],
            borderColor: "lime",
            pointRadius: 0,
            borderWidth: 1
        }]
    },
    options: {
        animation: false,
        scales: {
            x: { display: false },
            y: { display: true }
        }
    }
});

// ---------------- FREQ CHART ----------------
const freqCtx = document.getElementById("freqChart").getContext("2d");

const freqChart = new Chart(freqCtx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Spectrum",
            data: [],
            borderColor: "cyan",
            pointRadius: 0,
            borderWidth: 1
        }]
    },
    options: {
        animation: false,
        scales: {
            x: { title: { display: true, text: "Frequency (Hz)" } },
            y: { title: { display: true, text: "Magnitude" } }
        }
    }
});

// ---------------- UPDATE FUNCTION ----------------
async function update() {
    try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data) return;

        document.getElementById("status").innerText =
            "Last update: " + new Date(data.timestamp).toLocaleTimeString();

        // TIME DOMAIN
        if (data.buffer) {
            timeChart.data.labels = data.buffer.map((_, i) => i);
            timeChart.data.datasets[0].data = data.buffer;
            timeChart.update();
        }

        // FREQUENCY DOMAIN
        if (data.spectrum && data.freq) {
            freqChart.data.labels = data.freq;
            freqChart.data.datasets[0].data = data.spectrum;
            freqChart.update();
        }

    } catch (e) {
        console.log("Error:", e);
    }
}

// refresh loop
setInterval(update, 300);
</script>

</body>
</html>
