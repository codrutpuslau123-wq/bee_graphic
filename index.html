<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<title>Live Signal + FFT FIX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fft.js/dist/fft.min.js"></script>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
}
canvas {
    background: #111;
    margin: 10px;
}
</style>
</head>

<body>

<h2>Live Signal + FFT (FIXED)</h2>

<canvas id="timeChart"></canvas>
<canvas id="fftChart"></canvas>

<script>
// ---------------- FIREBASE ----------------
firebase.initializeApp({
    databaseURL: "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/"
});

const db = firebase.database();

// ---------------- CONFIG ----------------
const MAX_POINTS = 256;

// ---------------- CHART TIME ----------------
const timeChart = new Chart(document.getElementById("timeChart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Semnal",
            data: [],
            borderColor: "lime",
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        scales: {
            x: { display: false },
            y: { min: -2, max: 2 }
        }
    }
});

// ---------------- CHART FFT ----------------
const fftChart = new Chart(document.getElementById("fftChart"), {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Spectru FFT",
            data: [],
            borderColor: "red",
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        scales: {
            x: { display: false }
        }
    }
});

// ---------------- HANN WINDOW ----------------
function hann(x) {
    const N = x.length;
    return x.map((v, i) =>
        v * (0.5 * (1 - Math.cos(2 * Math.PI * i / (N - 1))))
    );
}

// ---------------- FFT REAL ----------------
function computeFFT(signal) {
    const N = signal.length;

    const fft = new FFT(N);
    const input = fft.createComplexArray();
    const output = fft.createComplexArray();

    for (let i = 0; i < N; i++) {
        input[2*i] = signal[i];
        input[2*i + 1] = 0;
    }

    fft.transform(output, input);

    const mag = [];
    for (let i = 0; i < N/2; i++) {
        const re = output[2*i];
        const im = output[2*i+1];
        mag.push(Math.sqrt(re*re + im*im) / N);
    }

    return mag;
}

// ---------------- UPDATE ----------------
db.ref("stup_01/latest_data").on("value", snap => {

    const data = snap.val();
    if (!data || !Array.isArray(data.buffer)) return;

    let y = data.buffer;

    // zoom control
    if (y.length > MAX_POINTS) {
        y = y.slice(y.length - MAX_POINTS);
    }

    // ---------------- TIME DOMAIN ----------------
    timeChart.data.labels = y.map((_, i) => i);
    timeChart.data.datasets[0].data = y;
    timeChart.update('none');

    // ---------------- FFT ----------------
    const windowed = hann(y);
    let spectrum = computeFFT(windowed);

    spectrum = spectrum.slice(0, spectrum.length / 2);

    fftChart.data.labels = spectrum.map((_, i) => i);
    fftChart.data.datasets[0].data = spectrum;
    fftChart.update('none');
});
</script>

</body>
</html>
