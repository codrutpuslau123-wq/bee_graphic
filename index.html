<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<title>Live Bee Signal</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: black;
    color: #0f0;
    font-family: monospace;
    text-align: center;
}
canvas {
    background: #111;
    margin: 10px;
}
</style>
</head>

<body>

<h2>Live semnal + FFT</h2>

<canvas id="timeChart"></canvas>
<canvas id="fftChart"></canvas>

<script>
// ---------------- FIREBASE ----------------
const firebaseConfig = {
    databaseURL: "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ---------------- CHARTS ----------------
const timeCtx = document.getElementById("timeChart");
const fftCtx = document.getElementById("fftChart");

const timeChart = new Chart(timeCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Semnal timp",
            data: [],
            borderColor: "lime",
            pointRadius: 0
        }]
    },
    options: {
        animation: false
    }
});

const fftChart = new Chart(fftCtx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: "Spectru FFT",
            data: [],
            borderColor: "red",
            pointRadius: 0
        }]
    },
    options: {
        animation: false
    }
});

// ---------------- FFT simplu ----------------
function fft(signal) {
    const N = signal.length;
    let re = new Array(N).fill(0);
    let im = new Array(N).fill(0);

    for (let k = 0; k < N; k++) {
        for (let t = 0; t < N; t++) {
            const angle = 2 * Math.PI * k * t / N;
            re[k] += signal[t] * Math.cos(angle);
            im[k] -= signal[t] * Math.sin(angle);
        }
    }

    return re.map((r, i) => Math.sqrt(r*r + im[i]*im[i]));
}

// ---------------- FIREBASE LISTENER ----------------
db.ref("stup_01/latest_data").on("value", snap => {
    const data = snap.val();
    if (!data || !Array.isArray(data.buffer)) return;

    const y = data.buffer;

    // TIME DOMAIN
    timeChart.data.labels = y.map((_, i) => i);
    timeChart.data.datasets[0].data = y;
    timeChart.update();

    // FFT
    const spectrum = fft(y);

    fftChart.data.labels = spectrum.map((_, i) => i);
    fftChart.data.datasets[0].data = spectrum;
    fftChart.update();
});
</script>

</body>
</html>
