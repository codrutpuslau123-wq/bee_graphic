<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Signal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:black;color:lime;text-align:center;">

<h2>Live Signal + Spectrum</h2>

<canvas id="time" width="600" height="250"></canvas>
<canvas id="freq" width="600" height="250"></canvas>

<script>

const url = "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/stup_01/latest_data.json";

// CHART TIME
const ctx1 = document.getElementById("time").getContext("2d");
const timeChart = new Chart(ctx1, {
    type: "line",
    data: { datasets: [{ data: [], borderColor: "lime", pointRadius: 0 }] },
    options: { animation: false }
});

// CHART FREQ
const ctx2 = document.getElementById("freq").getContext("2d");
const freqChart = new Chart(ctx2, {
    type: "line",
    data: { datasets: [{ data: [], borderColor: "cyan", pointRadius: 0 }] },
    options: {
        animation: false,
        scales: {
            x: { type: 'linear' }
        }
    }
});

function fft(signal) {
    const N = signal.length;
    let real = new Array(N).fill(0);
    let imag = new Array(N).fill(0);

    // FFT super simplificat (magnitude only)
    for (let k = 0; k < N/2; k++) {
        let re = 0, im = 0;

        for (let n = 0; n < N; n++) {
            let angle = -2 * Math.PI * k * n / N;
            re += signal[n] * Math.cos(angle);
            im += signal[n] * Math.sin(angle);
        }

        real[k] = Math.sqrt(re*re + im*im);
    }

    return real.slice(0, N/2);
}

async function update() {
    const res = await fetch(url);
    const data = await res.json();

    if (!data || !data.buffer) return;

    const y = data.buffer;

    // TIME DOMAIN
    timeChart.data.datasets[0].data = y.map((v,i)=>({x:i,y:v}));

    // FFT IN BROWSER
    const spec = fft(y);

    freqChart.data.datasets[0].data = spec.map((v,i)=>({x:i,y:v}));

    timeChart.update();
    freqChart.update();
}

setInterval(update, 300);

</script>

</body>
</html>
