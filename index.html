<script>
// N MUST be power of 2
const N = 512;

db.ref("stup_01/latest_data").on("value", snap => {
  const data = snap.val();
  if (!data || !data.buffer) return;

  const y = data.buffer;
  const Fs = data.fs || 1000;

  // -------- TIME (zoom) --------
  const viewSize = Math.min(200, y.length);

  timeChart.data.labels = y.slice(-viewSize).map((_, i) => i);
  timeChart.data.datasets[0].data = y.slice(-viewSize);
  timeChart.update();

  // -------- FFT SETUP (FIX REAL) --------
  const f = new fftjs.FFT(N);

  const input = new Array(N).fill(0);

  for (let i = 0; i < N; i++) {
    input[i] = y[y.length - N + i] || 0;
  }

  const out = f.createComplexArray();
  const dataArr = f.createComplexArray();

  for (let i = 0; i < N; i++) {
    dataArr[2 * i] = input[i];
    dataArr[2 * i + 1] = 0;
  }

  f.transform(out, dataArr);

  // -------- MAGNITUDE --------
  const mags = [];
  const labels = [];

  for (let k = 0; k < N / 2; k++) {
    const re = out[2 * k];
    const im = out[2 * k + 1];

    const mag = Math.sqrt(re * re + im * im);

    mags.push(mag);
    labels.push((k * Fs / N).toFixed(1));
  }

  fftChart.data.labels = labels;
  fftChart.data.datasets[0].data = mags;
  fftChart.update();
});
</script>
