<!DOCTYPE html>
<html>
<head>
  <title>Bee Monitor Live</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:black; color:lime; text-align:center;">

<h2>LIVE Bee Signal</h2>
<canvas id="chart" width="600" height="300"></canvas>

<script>
const url = "https://bee-monitoring-de66b-default-rtdb.europe-west1.firebasedatabase.app/stup_01/latest_data.json";

const ctx = document.getElementById('chart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Signal',
            data: [],
            borderColor: 'lime',
            borderWidth: 1,
            pointRadius: 0
        }]
    },
    options: {
        animation: false,
        scales: {
            x: { display: false },
            y: { min: -1.5, max: 1.5 }
        }
    }
});

async function update() {
    try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data || !data.buffer) return;

        let y = data.buffer;

        chart.data.labels = y.map((_, i) => i);
        chart.data.datasets[0].data = y;

        chart.update();

    } catch (e) {
        console.log("Eroare:", e);
    }
}

setInterval(update, 300);
</script>

</body>
</html>
